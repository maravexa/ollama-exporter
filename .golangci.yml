version: "2"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/maravexa/ollama-exporter

linters:
  enable:
    - errcheck        # unchecked errors
    - govet           # go vet checks
    - staticcheck     # comprehensive static analysis
    - unused          # unused code
    - ineffassign     # useless assignments
    - gosec           # security-oriented checks
    - misspell        # catches typos in comments and strings
    - bodyclose       # unclosed HTTP response bodies (critical for proxy code)
    - nilerr          # returning nil when err is non-nil
    - unparam         # unused function parameters
    - prealloc        # slice preallocation suggestions
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (io.ReadCloser).Close
    govet:
      enable:
        - shadow       # catch variable shadowing
    gosec:
      excludes:
        - G104         # unhandled errors (errcheck covers this better)
  exclusions:
    rules:
      # Test files: relax errcheck and gosec (test assertions handle errors)
      - path: _test\.go
        linters:
          - errcheck
          - gosec

run:
  timeout: 5m
