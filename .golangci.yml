run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - noctx

linters-settings:
  goimports:
    local-prefixes: github.com/maravexa/ollama-exporter

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
